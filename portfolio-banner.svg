<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="40" fill="rgba(255,255,255,0.1)" />
  <circle cx="700" cy="320" r="60" fill="rgba(255,255,255,0.1)" />
  <circle cx="650" cy="100" r="30" fill="rgba(255,255,255,0.1)" />
  
  <!-- Container boxes representing microservices -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="rgba(255,255,255,0.9)" />
    <rect x="10" y="10" width="100" height="15" rx="3" fill="#667eea" />
    <rect x="10" y="35" width="80" height="8" rx="2" fill="#e0e7ff" />
    <rect x="10" y="50" width="90" height="8" rx="2" fill="#e0e7ff" />
    <circle cx="60" cy="70" r="3" fill="#4ade80" />
  </g>
  
  <g transform="translate(200, 150)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="rgba(255,255,255,0.9)" />
    <rect x="10" y="10" width="100" height="15" rx="3" fill="#764ba2" />
    <rect x="10" y="35" width="70" height="8" rx="2" fill="#e0e7ff" />
    <rect x="10" y="50" width="95" height="8" rx="2" fill="#e0e7ff" />
    <circle cx="60" cy="70" r="3" fill="#4ade80" />
  </g>
  
  <g transform="translate(350, 100)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="rgba(255,255,255,0.9)" />
    <rect x="10" y="10" width="100" height="15" rx="3" fill="#667eea" />
    <rect x="10" y="35" width="85" height="8" rx="2" fill="#e0e7ff" />
    <rect x="10" y="50" width="75" height="8" rx="2" fill="#e0e7ff" />
    <circle cx="60" cy="70" r="3" fill="#4ade80" />
  </g>
  
  <g transform="translate(520, 150)">
    <rect x="0" y="0" width="120" height="80" rx="8" fill="rgba(255,255,255,0.9)" />
    <rect x="10" y="10" width="100" height="15" rx="3" fill="#764ba2" />
    <rect x="10" y="35" width="90" height="8" rx="2" fill="#e0e7ff" />
    <rect x="10" y="50" width="80" height="8" rx="2" fill="#e0e7ff" />
    <circle cx="60" cy="70" r="3" fill="#4ade80" />
  </g>
  
  <!-- Connection lines -->
  <line x1="170" y1="140" x2="200" y2="190" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="320" y1="190" x2="350" y2="140" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="470" y1="140" x2="520" y2="190" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- Main text -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">
    My Microservice
  </text>
  <text x="400" y="365" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">
    Portfolio
  </text>
</svg>
